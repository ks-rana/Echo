<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | Digital Peace</title>
    <style>
        :root {
            --soft-pink: #fce4ec;
            --deep-rose: #880e4f;
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #ff85a1;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: #fff;
            font-family: 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
        }

        /* The Glass Card */
        .glass-card {
            width: 90%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.8s ease-out;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .subtitle {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
